name: Daily Tokyo Weather Music

on:
  schedule:
    - cron: '0 21 * * *'   # UTC 21:00 = JST 06:00
    - cron: '0 5 * * *'    # UTC 05:00 = JST 14:00
  workflow_dispatch:         # 手動トリガー（テスト用）

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # podcast.pyのgit push用（Phase 2）
      issues: write          # 失敗通知用

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Configure git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Actions"
          git config --global safe.directory "$GITHUB_WORKSPACE"

      - name: Install ffmpeg and fluidsynth
        run: sudo apt-get install -y ffmpeg fluidsynth

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily music generation
        run: PYTHONPATH=. python src/main.py
        id: generate
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          SUNO_COOKIE:            ${{ secrets.SUNO_COOKIE }}
          YOUTUBE_CLIENT_ID:      ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:  ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          HF_API_TOKEN:           ${{ secrets.HF_API_TOKEN }}
          UNSPLASH_ACCESS_KEY:    ${{ secrets.UNSPLASH_ACCESS_KEY }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN:           ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push podcast/playlist updates
        run: |
          git add docs/ data/ || true
          git diff --staged --quiet || git commit -m "podcast: add episode $(date -u +'%Y-%m-%d_%H%M')"
          git push || true
        if: always()
